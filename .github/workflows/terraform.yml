name: "Terraform"

on:
  push:
    branches:
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  # Plan, apply, or destroy the GitHub org Terraform configuration.
  terraform:
    name: "Terraform ${{ inputs.terraform_action || 'plan' }}"
    runs-on: ubuntu-latest
    environment: prd
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      # The github provider manages org resources, so it needs an org-admin
      # token. A GitHub App token (minted below) is used instead of a PAT.
      GITHUB_OWNER: skyhaven-ltd
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Generate GitHub App Token"
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: skyhaven-ltd

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.15.3

      - name: "Ensure State Container"
        uses: ./.github/actions/ensure-tfstate-container
        with:
          storage_account_name: sttfsplatformprduks01
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Terraform Init"
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=rg-tfs-platform-prd-uks-01" \
            -backend-config="storage_account_name=sttfsplatformprduks01" \
            -backend-config="container_name=$REPO_NAME" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="subscription_id=${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}"

      - name: "Terraform Plan"
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == ''
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          terraform -chdir=infra plan -var-file="vars/global.tfvars"

      - name: "Terraform Apply"
        if: inputs.terraform_action == 'apply'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          terraform -chdir=infra apply -auto-approve -var-file="vars/global.tfvars"

      - name: "Terraform Destroy"
        if: inputs.terraform_action == 'destroy'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          terraform -chdir=infra destroy -auto-approve -var-file="vars/global.tfvars"

      - name: "Break State Lease"
        if: always()
        uses: ./.github/actions/break-tfstate-lease
        with:
          storage_account_name: sttfsplatformprduks01
          container_name: ${{ github.event.repository.name }}
          azure_client_id: ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
